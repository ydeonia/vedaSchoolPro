<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate — EduFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 30%,#fbbf24 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .donate-card{background:white;border-radius:24px;padding:32px;width:460px;max-width:100%;box-shadow:0 16px 48px rgba(0,0,0,0.1);}
        .school-name{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:#d97706;font-weight:700;text-align:center;margin-bottom:6px;}
        .donate-title{font-size:1.3rem;font-weight:900;text-align:center;color:#0f172a;margin-bottom:4px;}
        .donate-sub{text-align:center;color:#64748b;font-size:0.78rem;margin-bottom:24px;}
        .df{margin-bottom:14px;}
        .df label{font-size:0.65rem;font-weight:700;text-transform:uppercase;color:#64748b;letter-spacing:0.5px;display:block;margin-bottom:4px;}
        .df input,.df select,.df textarea{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:0.85rem;background:white;color:#0f172a;}
        .df input:focus,.df select:focus,.df textarea:focus{border-color:#d97706;outline:none;box-shadow:0 0 0 3px rgba(217,119,6,0.12);}
        .df textarea{resize:vertical;min-height:60px;}
        .amount-presets{display:flex;gap:8px;margin-bottom:10px;}
        .amount-presets button{flex:1;padding:10px;border:1.5px solid #e2e8f0;border-radius:10px;background:white;cursor:pointer;font-weight:700;font-size:0.82rem;color:#0f172a;transition:all 0.2s;}
        .amount-presets button:hover,.amount-presets button.sel{border-color:#d97706;background:#fffbeb;color:#d97706;}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .chk{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#64748b;margin:8px 0;}
        .chk input{width:16px;height:16px;accent-color:#d97706;}
        .donate-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;font-size:1rem;font-weight:800;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
        .donate-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(217,119,6,0.3);}
        .donate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
        .note{text-align:center;font-size:0.65rem;color:#94a3b8;margin-top:12px;}
        .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .success-msg{text-align:center;padding:40px 20px;}
        .success-msg .icon{width:64px;height:64px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-size:1.6rem;}
    </style>
</head>
<body>
<div class="donate-card" id="donateCard">
    <div class="school-name" id="schoolName">School</div>
    <div class="donate-title">💛 Make a Donation</div>
    <div class="donate-sub">Your contribution helps build a better future for students</div>

    <div class="df"><label>Your Name *</label>
        <input type="text" id="donorName" placeholder="Full Name"></div>
    <div class="row2">
        <div class="df"><label>Phone</label>
            <input type="tel" id="donorPhone" placeholder="+91 98765 43210"></div>
        <div class="df"><label>Email</label>
            <input type="email" id="donorEmail" placeholder="you@email.com"></div>
    </div>

    <div class="df"><label>Donation Amount (₹) *</label></div>
    <div class="amount-presets">
        <button onclick="setAmt(1000,this)">₹1,000</button>
        <button onclick="setAmt(5000,this)">₹5,000</button>
        <button onclick="setAmt(10000,this)">₹10,000</button>
        <button onclick="setAmt(25000,this)">₹25,000</button>
    </div>
    <div class="df"><input type="number" id="donorAmount" placeholder="Or enter custom amount" min="100" oninput="clearPresets()"></div>

    <div class="row2">
        <div class="df"><label>Purpose</label>
            <select id="donorPurpose">
                <option value="general">General Fund</option>
                <option value="infrastructure">Infrastructure</option>
                <option value="scholarship">Scholarship</option>
                <option value="building">Building Fund</option>
                <option value="sports">Sports</option>
                <option value="library">Library</option>
                <option value="event">Event</option>
            </select></div>
        <div class="df"><label>PAN (for 80G receipt)</label>
            <input type="text" id="donorPan" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase;"></div>
    </div>

    <div class="df"><label>Message (Optional)</label>
        <textarea id="donorMsg" placeholder="Leave a message..."></textarea></div>

    <div class="chk"><input type="checkbox" id="donorAnon"><label for="donorAnon">Make my donation anonymous</label></div>

    <button class="donate-btn" id="donateBtn" onclick="submitDonation()">
        <i class="fas fa-heart"></i> Donate Now
    </button>

    <div class="note">This donation is entirely voluntary. 80G tax receipt will be emailed if PAN is provided.</div>
</div>

<script>
const branchId=new URLSearchParams(window.location.search).get('branch_id')||window.location.pathname.split('/').pop();

function setAmt(v,btn){
    document.getElementById('donorAmount').value=v;
    document.querySelectorAll('.amount-presets button').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
}
function clearPresets(){document.querySelectorAll('.amount-presets button').forEach(b=>b.classList.remove('sel'));}

async function submitDonation(){
    const name=document.getElementById('donorName').value.trim();
    const amount=parseFloat(document.getElementById('donorAmount').value);
    if(!name){alert('Please enter your name');return;}
    if(!amount||amount<100){alert('Minimum donation is ₹100');return;}

    const btn=document.getElementById('donateBtn');
    btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Processing...';

    try{
        const r=await fetch('/api/payments/donate',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                branch_id:branchId,
                donor_name:name,
                donor_phone:document.getElementById('donorPhone').value.trim(),
                donor_email:document.getElementById('donorEmail').value.trim(),
                donor_pan:document.getElementById('donorPan').value.trim().toUpperCase(),
                amount:amount,
                purpose:document.getElementById('donorPurpose').value,
                message:document.getElementById('donorMsg').value.trim(),
                is_anonymous:document.getElementById('donorAnon').checked,
                payment_mode:'online'
            })
        }).then(r=>r.json());

        if(r.success){
            document.getElementById('donateCard').innerHTML=`
                <div class="success-msg">
                    <div class="icon">💛</div>
                    <div style="font-weight:900;font-size:1.3rem;">Thank You!</div>
                    <div style="color:#64748b;margin:8px 0;">Your donation of ₹${amount.toLocaleString('en-IN')} has been recorded.</div>
                    <div style="font-size:0.78rem;color:#64748b;">Receipt: ${r.receipt_number||'—'}</div>
                    ${document.getElementById('donorPan').value?'<div style="font-size:0.72rem;color:#d97706;margin-top:8px;">80G tax receipt will be emailed shortly.</div>':''}
                </div>`;
        }else{throw new Error(r.detail||'Failed');}
    }catch(e){
        alert('Error: '+e.message);
        btn.disabled=false;btn.innerHTML='<i class="fas fa-heart"></i> Donate Now';
    }
}
</script>
</body>
</html>
