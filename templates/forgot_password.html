{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-unlock-alt"></i></div>
        <h1>Forgot Password</h1>
        <p>Enter your email to receive a reset link</p>
    </div>

    <div id="forgotForm">
        <div id="fError" style="display:none; background:var(--danger-light,#fef2f2); color:var(--danger,#dc2626); padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:0.82rem; font-weight:600;"></div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label style="font-size:0.8rem; font-weight:700; color:var(--text-secondary); margin-bottom:4px; display:block;">Email Address</label>
            <input type="email" id="resetEmail" class="form-input" placeholder="Enter your registered email" autofocus>
        </div>

        <button type="button" onclick="sendResetLink()" id="sendBtn" class="btn btn-primary btn-lg" style="width:100%;">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>

        <div style="text-align:center; margin-top:16px;">
            <a href="/login" style="color:var(--primary); font-size:0.82rem; font-weight:600;"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <div id="forgotSuccess" style="display:none; text-align:center; padding:20px 0;">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--primary-light,#e0e7ff);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
            <i class="fas fa-envelope" style="font-size:1.5rem;color:var(--primary);"></i>
        </div>
        <h3 style="color:var(--text-primary);margin:0 0 6px;">Check Your Email</h3>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0 0 6px;">If an account exists with that email, we've sent a password reset link.</p>
        <p style="color:var(--text-light);font-size:0.78rem;margin:0 0 16px;">The link will expire in <strong>24 hours</strong>.</p>
        <a href="/login" class="btn btn-primary" style="display:inline-block;"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
    </div>
</div>

<script>
async function sendResetLink(){
    var email=document.getElementById('resetEmail').value.trim();
    var err=document.getElementById('fError');
    err.style.display='none';

    if(!email||email.indexOf('@')===-1){err.textContent='Please enter a valid email address';err.style.display='block';return;}

    var btn=document.getElementById('sendBtn');
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Sending...';

    try{
        var resp=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})});
        var d=await resp.json();
        if(d.success){
            document.getElementById('forgotForm').style.display='none';
            document.getElementById('forgotSuccess').style.display='block';
        } else {
            err.textContent=d.error||'Failed';err.style.display='block';
            btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Send Reset Link';
        }
    }catch(e){
        err.textContent='Connection failed';err.style.display='block';
        btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Send Reset Link';
    }
}

document.getElementById('resetEmail').addEventListener('keypress',function(e){if(e.key==='Enter')sendResetLink();});
</script>
{% endblock %}
