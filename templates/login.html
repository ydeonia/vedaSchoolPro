{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>EduFlow</h1>
        <p>Beautiful School Management, Simplified.</p>
    </div>

    {% if error %}
    <div style="background: var(--danger-light); color: var(--danger); padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 0.85rem; font-weight: 500;">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background: var(--success-light); color: var(--success); padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 0.85rem; font-weight: 500;">
        <i class="fas fa-check-circle"></i> {{ success }}
    </div>
    {% endif %}

    <form class="auth-form" method="POST" action="/login">
        <div class="form-group">
            <label class="form-label">Email or Phone</label>
            <div style="position: relative;">
                <input type="text" name="username" class="form-input" placeholder="Enter your email or phone"
                       required style="padding-left: 42px;" value="{{ username or '' }}">
                <i class="fas fa-user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position: relative;">
                <input type="password" name="password" id="password" class="form-input" placeholder="Enter your password"
                       required style="padding-left: 42px; padding-right: 42px;">
                <i class="fas fa-lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer;">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-secondary); cursor: pointer;">
                <input type="checkbox" name="remember" style="accent-color: var(--primary);">
                Remember me
            </label>
            <a href="/forgot-password" style="font-size: 0.82rem; color: var(--primary); font-weight: 600;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>

    <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-light);">
        <p style="font-size: 0.78rem; color: var(--text-light);">
            Powered by <strong style="color: var(--primary);">EduFlow</strong> — School Management System
        </p>
    </div>
</div>

<script>
function togglePasswordVisibility() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
