name: vedaflow_app
description: VedaSchoolPro — Smart School Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.1
  connectivity_plus: ^6.0.3

  # Local Storage / Offline
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3

  # Routing
  go_router: ^14.2.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  # firebase_core: ^2.27.1         # Add back when Firebase is configured
  # firebase_messaging: ^14.7.20   # Add back when Firebase is configured
  # flutter_local_notifications: ^17.1.2  # Add back later
  # permission_handler: ^11.3.0    # Add back later
  # local_auth: ^2.2.0             # Add back later
  # mobile_scanner: ^5.1.1         # Add back later

  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
